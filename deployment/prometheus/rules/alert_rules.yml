# deployment/prometheus/rules/alert_rules.yml
groups:
  - name: bike-api-alerts
    rules:
      - alert: BikeApiDown
        expr: up{job="bike-api"} == 0 # La condition PromQL qui déclenche l'alerte
        for: 1m # L'alerte se déclenche si la condition est vraie pendant 1 minute continue
        labels:
          severity: critical # Label pour la gravité de l'alerte (utile pour filtrer et prioriser)
        annotations:
          summary: "L'API de prediction de vélos partagés est injoignable."
          description: "Le job 'bike-api' est en statut DOWN (injoignable) depuis plus de 1 minute. Veuillez vérifier le conteneur `bike-api`."
  